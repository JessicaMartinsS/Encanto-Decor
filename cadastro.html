<body>

        <video autoplay loop muted playsinline>
            <source src="img/logo.video.mp4" type="video/mp4">
        </video>
    </div>

    <div class="header-phrase">
        <h1>Transformamos Sonhos em Realidade</h1>

    <!-- No index.html -->

        <a href="index.html">Início</a>
        <a href="galeria.html">Galeria</a>
        <a href="cadastro.html">Catálogo</a> <!-- Antes era catalogo.html -->
    </nav>

</header>

<main class="cadastro-section">
    <div class="cadastro-container">
        <h2>Quase lá! ✨</h2>
        <p>Preencha seus dados para visualizar nosso catálogo completo com temas e valores exclusivos para sua festa.</p>

        <!-- Formulário unificado -->
        <div class="form-cadastro">
            <div class="input-group">
                <label>🎈 Nome e Sobrenome</label>
                <input type="text" id="input-nome" placeholder="Como podemos te chamar?" required>
            </div>

            <div class="input-group">
                <label>📧 E-mail</label>
                <input type="email" id="input-email" placeholder="exemplo@email.com">
            </div>

            <div class="input-group">
                <label>📞 WhatsApp</label>
                <input type="tel" id="input-telefone" placeholder="(11) 99999-9999">
            </div>

            <button type="button" onclick="salvarCadastroInicial()" class="btn-acessar">
                Catálogo ➔
            </button>
        </div> <!-- Fechamento da form-cadastro -->
    </div> <!-- Fechamento da cadastro-container (CORRIGIDO) -->
</main> <!-- Fechamento da main (CORRIGIDO) -->



<footer>
    <p>&copy; 2026 Jess & Ster Encanto Decor - Itaquaquecetuba, SP</p>
    <p class="dev-credit">Desenvolvido por Jessica Silva</p>
</footer>

<!-- Script de ponte entre Páginas -->
<script>

    function salvarCadastroInicial() {
        const nome = document.getElementById('input-nome').value;
        const email = document.getElementById('input-email').value;
        const telefone = document.getElementById('input-telefone').value;

        if (nome.trim() === "") {
            alert("Por favor, preencha seu nome para continuar! ✨");
            return;
        }

        localStorage.setItem('nome_cliente', nome);
        localStorage.setItem('email_cliente', email);
        localStorage.setItem('telefone_cliente', telefone);

        alert(`Seja bem-vinda, ${nome}! Vamos ver nossos kits?`);
        window.location.href = "catalogo.html";
    }

</script>

<script>
    window.addEventListener('load', () => {
    const logadoNestaSessao = sessionStorage.getItem('cliente_logado');
    const nomeSalvo = localStorage.getItem('nome_cliente');

    // REGRA 1: Se ela já se identificou nesta aba, pula direto para o catálogo
    if (logadoNestaSessao === 'true') {
        window.location.href = "catalogo.html";
        return;
    }

    // REGRA 2: Se ela fechou o site e voltou, os campos preenchem sozinhos (Login Automático)
    if (nomeSalvo) {
        document.getElementById('input-nome').value = nomeSalvo;
        document.getElementById('input-email').value = localStorage.getItem('email_cliente') || '';
        document.getElementById('input-telefone').value = localStorage.getItem('telefone_cliente') || '';
        
        // Opcional: Mostrar uma mensagem de "Bem-vinda de volta"
        console.log("Dados carregados. Clique em entrar.");
    }
});

function salvarCadastroInicial() {
    const nome = document.getElementById('input-nome').value;
    const email = document.getElementById('input-email').value;
    const telefone = document.getElementById('input-telefone').value;

    if (nome.trim() === "" || telefone.trim() === "") {
        alert("Por favor, preencha os campos para continuar! ✨");
        return;
    }

    // Salva permanentemente (para não ter que digitar tudo de novo no futuro)
    localStorage.setItem('nome_cliente', nome);
    localStorage.setItem('email_cliente', email);
    localStorage.setItem('telefone_cliente', telefone);

    // Salva apenas para esta aba (se fechar, isso aqui some)
    sessionStorage.setItem('cliente_logado', 'true');

    window.location.href = "catalogo.html";
}
</script>
<script src="js/script.js"></script>
